<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Глава полиции</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #0d0d1a; color: #d0d0d0; font-size: 14px; overflow: hidden; height: 100vh; }
        .hidden { display: none !important; }
        .screen { padding: 10px; height: 100vh; display: flex; flex-direction: column; }
        .btn { width: 100%; padding: 10px; margin: 4px 0; background: #141428; color: #d0d0d0; border: 1px solid #2a2a4a; border-radius: 8px; font-size: 13px; cursor: pointer; text-align: center; display: block; }
        .btn.green { border-color: #4CAF50; color: #4CAF50; }
        .btn.red { border-color: #e94560; color: #e94560; }
        .top-bar { display: flex; gap: 4px; flex-wrap: wrap; padding: 8px; background: #141428; border-radius: 8px; }
        .stat { font-size: 11px; background: #1a1a35; padding: 4px 8px; border-radius: 4px; }
        .tabs { display: flex; gap: 3px; margin: 4px 0; }
        .tab { flex: 1; padding: 8px; text-align: center; background: #141428; border-radius: 6px; font-size: 10px; cursor: pointer; border: 1px solid #2a2a4a; }
        .tab.active { border-color: #e94560; }
        .map-container { flex: 1; position: relative; }
        svg { width: 100%; height: 100%; }
        .district { stroke: #2a2a4a; stroke-width: 2; cursor: pointer; }
        .district:hover { stroke: #fff; stroke-width: 3; }
        .squad-icon, .unit-icon { cursor: pointer; font-size: 18px; }
        .squad-icon:active, .unit-icon:active { cursor: grabbing; transform: scale(1.3); }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #141428; padding: 16px; border-radius: 12px; max-width: 90%; }
        .quick-actions { position: absolute; bottom: 50px; left: 0; right: 0; display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; padding: 8px; background: rgba(0,0,0,0.7); }
        .quick-btn { background: #16213e; color: #e0e0e0; border: 1px solid #0f3460; border-radius: 6px; padding: 6px 10px; font-size: 11px; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: #0d0d1a; border-top: 1px solid #2a2a4a; padding: 6px; }
        .nav-btn { flex: 1; padding: 8px; text-align: center; font-size: 10px; background: none; border: none; color: #888; cursor: pointer; }
        .nav-btn.active { color: #e94560; }
    </style>
</head>
<body>
    <div id="menu" class="screen">
        <h2>🛡️ Глава полиции</h2>
        <p style="color:#e94560;">Час расплаты</p>
        <button class="btn green" onclick="start('captain')">🟢 Капитан — 15M ₽</button>
        <button class="btn" style="border-color:#FF9800;color:#FF9800;" onclick="start('major')">🟡 Майор — 10M ₽</button>
        <button class="btn red" onclick="start('colonel')">🔴 Полковник — 6M ₽</button>
    </div>
    <div id="game" class="screen hidden">
        <div class="top-bar" id="bar"></div>
        <div class="tabs">
            <div class="tab active" data-t="map">🗺️</div>
            <div class="tab" data-t="main">📋</div>
            <div class="tab" data-t="squads">🚔</div>
            <div class="tab" data-t="build">🏗️</div>
        </div>
        <div id="t-map" class="map-container">
            <div class="quick-actions">
                <button class="quick-btn" onclick="alertLevel('green')">🟢</button>
                <button class="quick-btn" onclick="alertLevel('yellow')">🟡</button>
                <button class="quick-btn" onclick="alertLevel('red')">🔴</button>
                <button class="quick-btn" onclick="gov('Армия')">🪖</button>
                <button class="quick-btn" onclick="gov('Росгвардия')">⚡</button>
                <button class="quick-btn" onclick="gov('МЧС')">🚒</button>
                <button class="quick-btn" onclick="gov('ФСБ')">🕵️</button>
                <button class="quick-btn" onclick="gov('Мэрия')">🏛️</button>
                <button class="quick-btn" onclick="gov('СМИ')">📰</button>
            </div>
        </div>
        <div id="t-main" class="hidden"></div>
        <div id="t-squads" class="hidden"></div>
        <div id="t-build" class="hidden"></div>
        <div class="bottom-nav">
            <button class="nav-btn active" data-t="map">🗺️</button>
            <button class="nav-btn" data-t="main">📋</button>
            <button class="nav-btn" data-t="squads">🚔</button>
            <button class="nav-btn" data-t="build">🏗️</button>
        </div>
    </div>
    <div id="modal" class="modal hidden"><div class="modal-content" id="m-content"></div></div>

    <script>
        const TG = window.Telegram.WebApp; TG.ready(); TG.expand();
        const UID = TG.initDataUnsafe?.user?.id || 1;
        let gs = null, sd = null, ss = null, su = null, mm = false, da = false, dst = 0;
        const D = ["Центр","Северный","Спальный","Зелёный","Промзона","Старый город","Заречный","Вокзальный"];
        const DP = { "Центр":"M250150L400150L420220L380300L250300L220220Z","Северный":"M20060L40060L400150L250150L220100Z","Спальный":"M100150L250150L220220L100280Z","Зелёный":"M60250L100150L100280Z","Промзона":"M380300L500250L550350L450400Z","Старый город":"M250300L380300L350450L250450Z","Заречный":"M100280L220220L250450L100420Z","Вокзальный":"M450400L550350L600500L450500Z" };
        const UI = { dps:'🚔', obep:'🕵️', sk:'⚖️', proc:'🏛️', internal:'🔍' };
        const CN = { "Центр":[320,220],"Северный":[300,100],"Спальный":[160,200],"Зелёный":[80,220],"Промзона":[470,320],"Старый город":[310,370],"Заречный":[160,350],"Вокзальный":[520,440] };

        function rc(r) { return r>70?'#e94560':r>40?'#FF9800':'#4CAF50'; }
        async function api(u, b={}) { const r = await fetch(u, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user_id:UID, ...b}) }); return r.json(); }
        function st(t) {
            document.querySelectorAll('.tab,.nav-btn').forEach(e=>e.classList.remove('active'));
            document.querySelectorAll(`[data-t="${t}"]`).forEach(e=>e.classList.add('active'));
            ['map','main','squads','build'].forEach(x=>document.getElementById(`t-${x}`).classList.add('hidden'));
            document.getElementById(`t-${t}`).classList.remove('hidden');
            if(t==='map') rm(); if(t==='main') rmain(); if(t==='squads') rsq(); if(t==='build') rb();
        }
        document.querySelectorAll('.tab,.nav-btn').forEach(e=>e.addEventListener('click',()=>st(e.dataset.t)));

        async function start(d) {
            const r = await api('/api/new_game', {difficulty: d});
            if (r.status === 'ok') {
                gs = r.state;
                document.getElementById('menu').classList.add('hidden');
                document.getElementById('game').classList.remove('hidden');
                ub();
                st('map');
            }
        }

        function ub() {
            const s = gs;
            document.getElementById('bar').innerHTML = `
                <span class="stat">📅 ${s.day}</span>
                <span class="stat">💰 ${(s.budget||0).toLocaleString()} ₽</span>
                <span class="stat" style="color:${s.threat>70?'#e94560':'#4CAF50'}">⚠️ ${s.threat}%</span>
                <span class="stat" style="color:${s.stability<30?'#e94560':'#4CAF50'}">🏙️ ${s.stability}%</span>
            `;
        }

        function rm() {
            if (!gs) return;
            const s = gs;
            let h = `<svg viewBox="0 0 650 550" xmlns="http://www.w3.org/2000/svg">`;
            for (const [n, p] of Object.entries(DP)) {
                h += `<path class="district" d="${p}" fill="${rc(s.riots[n]||0)}" fill-opacity="0.3" stroke="#fff" stroke-width="1.5" onclick="dc('${n}')"/>`;
                const c = CN[n];
                h += `<text x="${c[0]}" y="${c[1]-8}" text-anchor="middle" fill="white" font-size="11">${n}</text>`;
            }
            for (const [d, st] of Object.entries(s.police_stations||{})) if (st.active) { const c = CN[d]; h += `<text x="${c[0]}" y="${c[1]-20}" font-size="22" fill="#4CAF50" text-anchor="middle">🏢</text>`; }
            for (const [d, cp] of Object.entries(s.checkpoints||{})) if (cp.active) { const c = CN[d]; h += `<text x="${c[0]}" y="${c[1]+20}" font-size="18" fill="orange" text-anchor="middle">🚧</text>`; }
            for (const [t, u] of Object.entries(s.special_units||{})) { const loc = u.location||'Центр'; const c = CN[loc]; h += `<text id="unit-${t}" class="unit-icon" x="${c[0]+15}" y="${c[1]-20}" font-size="18" fill="cyan" text-anchor="middle" ontouchstart="ut(event,'${t}')" onmousedown="ut(event,'${t}')">${UI[t]||'🏢'}</text>`; }
            for (const sq of (s.squads||[])) { const c = CN[sq.location]; h += `<text id="squad-${sq.name}" class="squad-icon" x="${c[0]}" y="${c[1]}" font-size="20" fill="white" text-anchor="middle" ontouchstart="stq(event,'${sq.name}')" onmousedown="stq(event,'${sq.name}')">🚔</text>`; }
            h += '</svg>';
            document.getElementById('t-map').innerHTML = h;
        }

        function gd(x, y) { let min = 1e9, b = null; for (const [n, c] of Object.entries(CN)) { const d = Math.hypot(c[0]-x, c[1]-y); if (d < min) { min = d; b = n; } } return b; }

        function sdrag(e, n, tp) {
            e.preventDefault(); if (tp === 'unit') su = n; else ss = n; dst = Date.now(); da = false;
            document.addEventListener('touchmove', dm, {passive: false}); document.addEventListener('touchend', de);
            document.addEventListener('mousemove', dm); document.addEventListener('mouseup', de);
        }
        function dm(e) { da = true; const t = e.touches ? e.touches[0] : e; const el = document.getElementById(su ? `unit-${su}` : `squad-${ss}`); if (el) { el.setAttribute('x', t.clientX); el.setAttribute('y', t.clientY-50); } }
        function de(e) {
            document.removeEventListener('touchmove', dm); document.removeEventListener('touchend', de);
            document.removeEventListener('mousemove', dm); document.removeEventListener('mouseup', de);
            const el = Date.now() - dst; const t = e.changedTouches ? e.changedTouches[0] : e; const tx = t.clientX, ty = t.clientY-50;
            if (!da && el < 150) { if (su) smu(su); else sms(ss); }
            else if (da) { const tg = gd(tx, ty); if (tg && gs) { if (su) api('/api/move_unit', {unit_type:su, district:tg}).then(d => { if (!d.error) { gs.special_units = d.special_units; ub(); rm(); } }); else api('/api/squad_action', {command:'move', params:{name:ss, district:tg}}).then(d => { if (!d.error) { gs.budget = d.budget; gs.squads = d.squads; ub(); rm(); } }); } else rm(); }
            su = null; ss = null;
        }
        const stq = (e, n) => sdrag(e, n, 'squad');
        const ut = (e, n) => sdrag(e, n, 'unit');

        function sms(name) {
            const sq = gs.squads?.find(s => s.name === name); if (!sq) return;
            document.getElementById('m-content').innerHTML = `<b>🚔 ${name}</b><br>📍 ${sq.location}<br><button class="btn green" onclick="sa('${name}','patrol')">👮 Патруль</button><button class="btn red" onclick="sa('${name}','suppress')">🚨 Подавить</button><button class="btn" style="border-color:#FF9800;color:#FF9800;" onclick="mm=true;ss='${name}';closeM();alert('Выберите район')">🚚 Переместить</button><button class="btn" onclick="sa('${name}','disband')">❌ Расформ.</button><button class="btn" onclick="closeM()">Отмена</button>`;
            document.getElementById('modal').classList.remove('hidden');
        }

        function smu(type) {
            const acts = { dps:[['🚔 Патруль','patrol'],['🚗 Перехват','intercept']], obep:[['🏪 Бизнес','check_business'],['🏛️ Мэрия','investigate_mayor']], sk:[['⚖️ Расслед.','investigate']], proc:[['📋 Санкция','sanction'],['🚫 Блок','block']], internal:[['🔍 Проверить','check'],['🧹 Чистка','purge']] };
            let h = `<b>${gs.special_units?.[type]?.name || type}</b><hr>`;
            (acts[type]||[]).forEach(a => h += `<button class="btn" onclick="ua('${type}','${a[1]}')">${a[0]}</button>`);
            h += '<button class="btn" onclick="closeM()">Отмена</button>';
            document.getElementById('m-content').innerHTML = h; document.getElementById('modal').classList.remove('hidden');
        }

        async function sa(name, act) {
            const sq = gs.squads?.find(s => s.name === name); if (!sq) return;
            if (act === 'disband') { const d = await api('/api/squad_action', {command:'disband', params:{name}}); if (!d.error) { gs.budget = d.budget; gs.squads = d.squads; } }
            else { const d = await api('/api/extra_action', {action_type:act, district:sq.location}); if (!d.error) { gs.budget = d.budget; gs.riots = d.riots; gs.threat = d.threat; } }
            ub(); closeM(); rm();
        }

        async function ua(type, act) { const d = await api('/api/unit_action', {unit_type:type, action:act}); if (d.error) alert(d.error); else { gs.budget = d.budget; gs.corruption = d.corruption; gs.threat = d.threat; ub(); closeM(); rm(); } }

        function dc(name) {
            sd = name;
            if (mm && ss) { api('/api/squad_action', {command:'move', params:{name:ss, district:name}}).then(d => { if (!d.error) { gs.budget = d.budget; gs.squads = d.squads; ub(); rm(); } }); mm = false; ss = null; closeM(); return; }
            const s = gs; let h = `<b>📍 ${name}</b><br>🔥 ${s.riots[name]||0}%<br>🚔 ${(s.squads||[]).filter(q => q.location === name).map(q => q.name).join(', ')||'нет'}<br>`;
            if (s.police_stations?.[name]?.active) h += '🏢 Участок ✅<br>'; if (s.checkpoints?.[name]?.active) h += '🚧 Блокпост ✅<br>';
            h += `<hr><button class="btn green" onclick="hs('${name}')">🚔 Нанять отряд (2M)</button><button class="btn" onclick="closeM()">Закрыть</button>`;
            document.getElementById('m-content').innerHTML = h; document.getElementById('modal').classList.remove('hidden');
        }

        async function hs(d) { const r = await api('/api/squad_action', {command:'form', params:{type:'патруль', district:d}}); if (r.error) alert(r.error); else { gs.budget = r.budget; gs.squads = r.squads; ub(); closeM(); rm(); } }

        async function alertLevel(l) { const d = await api('/api/set_alert_level', {level:l}); if (d.error) alert(d.error); else { gs.alert_level = d.alert_level; gs.budget = d.budget; ub(); } }
        async function gov(s) { const d = await api('/api/gov_request', {structure:s}); if (d.error) alert(d.error); else { gs.budget = d.budget; gs.trust = d.trust; gs.threat = d.threat; ub(); alert(d.result); } }
        function closeM() { document.getElementById('modal').classList.add('hidden'); mm = false; }

        function rb() { document.getElementById('t-build').innerHTML = '<h3>🏗️ Строительство</h3><div class="card"><b>🏢 Участок</b><br>5M ₽<br><button class="btn green" onclick="bs()">Построить</button></div><div class="card"><b>🚧 Блокпост</b><br>1M ₽<br><button class="btn" style="border-color:#FF9800;color:#FF9800;" onclick="bc()">Построить</button></div>'; }
        async function bs() { if (!sd) { alert('Выберите район!'); return; } const d = await api('/api/buy_station', {district:sd}); if (d.error) alert(d.error); else { gs.budget = d.budget; gs.police_stations = d.police_stations; ub(); rm(); } }
        async function bc() { if (!sd) { alert('Выберите район!'); return; } const d = await api('/api/extra_action', {action_type:'checkpoint', district:sd}); if (d.error) alert(d.error); else { gs.budget = d.budget; gs.riots = d.riots; if (!gs.checkpoints) gs.checkpoints = {}; gs.checkpoints[sd] = {active:true}; ub(); rm(); } }

        function rmain() {
            const s = gs; let h = '';
            if (s.game_over) h = `<div class="card">Игра завершена. День ${s.day}</div><button class="btn green" onclick="start('${s.difficulty||'major'}')">Новая игра</button>`;
            else if (!s.day_started) h = `<div class="card">День ${s.day}</div><button class="btn green" onclick="dsd()">📅 Начать день</button>`;
            else { h = `<div class="card">${s.last_summary||''}</div>`; (s.pending_actions||[]).forEach(a => h += `<button class="btn" onclick="da('${a}')">${a}</button>`); h += '<button class="btn red" onclick="ded()">🌙 Завершить день</button>'; }
            document.getElementById('t-main').innerHTML = h;
        }

        async function dsd() { const d = await api('/api/start_day'); if (d.error) alert(d.error); else { gs.day_started = true; gs.last_summary = d.summary; gs.pending_actions = d.actions; gs.budget = d.budget; ub(); st('main'); } }
        async function da(a) { const d = await api('/api/action', {action:a}); if (d.error) alert(d.error); else { gs.budget = d.budget; gs.threat = d.threat; gs.stability = d.stability; ub(); alert(d.result); rmain(); } }
        async function ded() { const d = await api('/api/end_day'); gs.day = d.day; gs.day_started = false; gs.budget = d.budget; gs.game_over = d.game_over; ub(); if (d.night_event) alert(d.night_event); if (d.game_over) alert(d.game_over_msg); st('main'); }

        function rsq() { let h = '<h3>🚔 Отряды</h3>'; (gs.squads||[]).forEach(s => h += `<div class="card">${s.name} (${s.type}) 📍${s.location} <button class="btn red" onclick="dsq('${s.name}')">❌</button></div>`); h += '<button class="btn green" onclick="asq()">+ Новый отряд (2M)</button>'; document.getElementById('t-squads').innerHTML = h; }
        async function asq() { const d = await api('/api/squad_action', {command:'form', params:{type:'патруль'}}); if (d.error) alert(d.error); else { gs.budget = d.budget; gs.squads = d.squads; ub(); rsq(); } }
        async function dsq(name) { const d = await api('/api/squad_action', {command:'disband', params:{name}}); if (d.error) alert(d.error); else { gs.budget = d.budget; gs.squads = d.squads; ub(); rsq(); rm(); } }
    </script>
</body>
  </html>
