<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Глава полиции</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #0d0d1a; color: #d0d0d0; font-size: 14px; overflow: hidden; height: 100vh; touch-action: none; }
        .hidden { display: none !important; }
        .screen { padding: 10px; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .game-screen { padding: 10px; height: 100vh; display: flex; flex-direction: column; justify-content: flex-start; align-items: stretch; text-align: left; }
        .btn { width: 80%; padding: 15px; margin: 10px 0; background: #141428; color: #d0d0d0; border: 1px solid #2a2a4a; border-radius: 10px; font-size: 16px; cursor: pointer; }
        .btn.green { border-color: #4CAF50; color: #4CAF50; }
        .btn.red { border-color: #e94560; color: #e94560; }
        .btn.small { width: auto; padding: 8px 12px; font-size: 12px; margin: 2px; }
        .top-bar { display: flex; gap: 4px; flex-wrap: wrap; padding: 8px; background: #141428; border-radius: 8px; }
        .stat { font-size: 11px; background: #1a1a35; padding: 4px 8px; border-radius: 4px; }
        .tabs { display: flex; gap: 3px; margin: 4px 0; }
        .tab { flex: 1; padding: 8px; text-align: center; background: #141428; border-radius: 6px; font-size: 10px; cursor: pointer; border: 1px solid #2a2a4a; }
        .tab.active { border-color: #e94560; }
        .map-container { flex: 1; position: relative; overflow: hidden; }
        svg { width: 100%; height: 100%; }
        .district { stroke: #fff; stroke-width: 1.5; cursor: pointer; }
        .district:hover { stroke-width: 3; }
        .emblem { cursor: pointer; }
        .emblem:active { transform: scale(1.3); }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #141428; padding: 16px; border-radius: 12px; max-width: 90%; }
        .quick-actions { position: absolute; bottom: 50px; left: 0; right: 0; display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; padding: 8px; background: rgba(0,0,0,0.7); }
        .quick-btn { background: #16213e; color: #e0e0e0; border: 1px solid #0f3460; border-radius: 6px; padding: 6px 10px; font-size: 11px; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: #0d0d1a; border-top: 1px solid #2a2a4a; padding: 6px; }
        .nav-btn { flex: 1; padding: 8px; text-align: center; font-size: 10px; background: none; border: none; color: #888; cursor: pointer; }
        .nav-btn.active { color: #e94560; }
        .card { background: #141428; padding: 10px; border-radius: 8px; margin: 4px 0; border: 1px solid #2a2a4a; }
    </style>
</head>
<body>
    <div id="menu" class="screen">
        <h2>🛡️ Глава полиции</h2>
        <p style="color:#e94560; margin-bottom:20px;">Час расплаты</p>
        <button class="btn green" onclick="start()">🎮 Начать игру</button>
    </div>
    <div id="game" class="game-screen hidden">
        <div class="top-bar" id="bar"></div>
        <div class="tabs">
            <div class="tab active" data-t="map">🗺️</div>
            <div class="tab" data-t="main">📋</div>
            <div class="tab" data-t="squads">🚔</div>
            <div class="tab" data-t="build">🏗️</div>
        </div>
        <div id="t-map" class="map-container">
            <div class="quick-actions">
                <button class="quick-btn" onclick="alertLevel('green')">🟢</button>
                <button class="quick-btn" onclick="alertLevel('yellow')">🟡</button>
                <button class="quick-btn" onclick="alertLevel('red')">🔴</button>
                <button class="quick-btn" onclick="gov('Армия')">🪖</button>
                <button class="quick-btn" onclick="gov('Росгвардия')">⚡</button>
                <button class="quick-btn" onclick="gov('МЧС')">🚒</button>
                <button class="quick-btn" onclick="gov('ФСБ')">🕵️</button>
                <button class="quick-btn" onclick="gov('Мэрия')">🏛️</button>
                <button class="quick-btn" onclick="gov('СМИ')">📰</button>
            </div>
        </div>
        <div id="t-main" class="hidden"></div>
        <div id="t-squads" class="hidden"></div>
        <div id="t-build" class="hidden"></div>
        <div class="bottom-nav">
            <button class="nav-btn active" data-t="map">🗺️</button>
            <button class="nav-btn" data-t="main">📋</button>
            <button class="nav-btn" data-t="squads">🚔</button>
            <button class="nav-btn" data-t="build">🏗️</button>
        </div>
    </div>
    <div id="modal" class="modal hidden"><div class="modal-content" id="m-content"></div></div>

    <script>
        const TG = window.Telegram.WebApp; TG.ready(); TG.expand();
        const UID = TG.initDataUnsafe?.user?.id || 1;
        let gs = null, sd = null, ss = null, su = null, scale = 1, tx = 0, ty = 0, pinching = false, lastDist = 0;
        const DP = { "Центр":"M250150L400150L420220L380300L250300L220220Z","Северный":"M20060L40060L400150L250150L220100Z","Спальный":"M100150L250150L220220L100280Z","Зелёный":"M60250L100150L100280Z","Промзона":"M380300L500250L550350L450400Z","Старый город":"M250300L380300L350450L250450Z","Заречный":"M100280L220220L250450L100420Z","Вокзальный":"M450400L550350L600500L450500Z" };
        const UI = { dps:'🛡️', obep:'🔍', sk:'⚖️', proc:'🏛️', internal:'🔒' };
        const CN = { "Центр":[320,220],"Северный":[300,100],"Спальный":[160,200],"Зелёный":[80,220],"Промзона":[470,320],"Старый город":[310,370],"Заречный":[160,350],"Вокзальный":[520,440] };
        const DN = { "Центр":"Сталинки","Северный":"Панельки","Спальный":"Хрущёвки","Зелёный":"Новостройки","Промзона":"Заводы","Старый город":"Купеческие","Заречный":"Частный сектор","Вокзальный":"Бараки" };

        function rc(r) { return r>70?'#e94560':r>40?'#FF9800':'#4CAF50'; }
        async function api(u, b={}) { const r = await fetch(u, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user_id:UID, ...b}) }); return r.json(); }
        function st(t) {
            document.querySelectorAll('.tab,.nav-btn').forEach(e=>e.classList.remove('active'));
            document.querySelectorAll(`[data-t="${t}"]`).forEach(e=>e.classList.add('active'));
            ['map','main','squads','build'].forEach(x=>document.getElementById(`t-${x}`).classList.add('hidden'));
            document.getElementById(`t-${t}`).classList.remove('hidden');
            if(t==='map') rm(); if(t==='main') rmain(); if(t==='squads') rsq(); if(t==='build') rb();
        }
        document.querySelectorAll('.tab,.nav-btn').forEach(e=>e.addEventListener('click',()=>st(e.dataset.t)));

        async function start() {
            const r = await api('/api/new_game', {difficulty: 'major'});
            if (r.status === 'ok') {
                gs = r.state;
                document.getElementById('menu').classList.add('hidden');
                document.getElementById('game').classList.remove('hidden');
                ub();
                st('map');
            }
        }

        function ub() {
            const s = gs;
            document.getElementById('bar').innerHTML = `
                <span class="stat">📅 День ${s.day}</span>
                <span class="stat">💰 ${(s.budget||0).toLocaleString()} ₽</span>
                <span class="stat" style="color:${s.threat>70?'#e94560':'#4CAF50'}">⚠️ ${s.threat}%</span>
                <span class="stat" style="color:${s.stability<30?'#e94560':'#4CAF50'}">🏙️ ${s.stability}%</span>
            `;
        }

        function rm() {
            if (!gs) return;
            const s = gs;
            let h = `<svg viewBox="0 0 650 550" xmlns="http://www.w3.org/2000/svg" style="background:#1a1a2e; transform: translate(${tx}px,${ty}px) scale(${scale}); transform-origin: 0 0;">`;
            for (const [n, p] of Object.entries(DP)) {
                const riot = s.riots[n] || 0;
                const color = rc(riot);
                h += `<path class="district" d="${p}" fill="${color}" fill-opacity="0.5" stroke="#fff" stroke-width="2" onclick="dc('${n}')"/>`;
                const c = CN[n];
                h += `<text x="${c[0]}" y="${c[1]-10}" text-anchor="middle" fill="white" font-size="12" font-weight="bold">${n}</text>`;
                h += `<text x="${c[0]}" y="${c[1]+4}" text-anchor="middle" fill="#ccc" font-size="9">${DN[n]}</text>`;
            }
            for (const [d, st] of Object.entries(s.police_stations||{})) if (st.active) { const c = CN[d]; h += `<text x="${c[0]}" y="${c[1]-22}" font-size="22" fill="#4CAF50" text-anchor="middle">🏢</text>`; }
            for (const [d, cp] of Object.entries(s.checkpoints||{})) if (cp.active) { const c = CN[d]; h += `<text x="${c[0]}" y="${c[1]+22}" font-size="18" fill="orange" text-anchor="middle">🚧</text>`; }
            for (const [t, u] of Object.entries(s.special_units||{})) { const loc = u.location||'Центр'; const c = CN[loc]; h += `<circle cx="${c[0]+15}" cy="${c[1]-20}" r="12" fill="#16213e" stroke="cyan" stroke-width="2"/><text id="unit-${t}" class="emblem" x="${c[0]+15}" y="${c[1]-15}" font-size="14" fill="cyan" text-anchor="middle" ontouchstart="sdrag(event,'${t}','unit')" onmousedown="sdrag(event,'${t}','unit')">${UI[t]||'🏢'}</text>`; }
            for (const sq of (s.squads||[])) { const c = CN[sq.location]; h += `<circle cx="${c[0]}" cy="${c[1]}" r="14" fill="#16213e" stroke="white" stroke-width="2"/><text id="squad-${sq.name}" class="emblem" x="${c[0]}" y="${c[1]+5}" font-size="16" fill="white" text-anchor="middle" ontouchstart="sdrag(event,'${sq.name}','squad')" onmousedown="sdrag(event,'${sq.name}','squad')">🚔</text>`; }
            h += '</svg>';
            document.getElementById('t-map').innerHTML = h;
            attachZoom();
        }

        function attachZoom() {
            const map = document.getElementById('t-map');
            map.addEventListener('touchstart', zoomStart, {passive: false});
            map.addEventListener('touchmove', zoomMove, {passive: false});
            map.addEventListener('touchend', zoomEnd);
        }

        function zoomStart(e) {
            if (e.touches.length === 2) { pinching = true; lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); e.preventDefault(); }
        }
        function zoomMove(e) {
            if (pinching && e.touches.length === 2) {
                const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                scale *= dist / lastDist;
                scale = Math.min(Math.max(scale, 0.5), 2.5);
                lastDist = dist;
                rm();
                e.preventDefault();
            }
        }
        function zoomEnd() { pinching = false; }

        function ptInPoly(px, py, poly) {
            let inside = false;
            for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
                const xi = poly[i][0], yi = poly[i][1], xj = poly[j][0], yj = poly[j][1];
                if ((yi > py) !== (yj > py) && px < (xj - xi) * (py - yi) / (yj - yi) + xi) inside = !inside;
            }
            return inside;
        }

        function polyFromPath(path) {
            const nums = path.match(/\d+/g).map(Number);
            const pts = [];
            for (let i = 0; i < nums.length; i += 2) pts.push([nums[i], nums[i+1]]);
            return pts;
        }

        function gd(x, y) {
            const sx = (x - tx) / scale, sy = (y - ty) / scale;
            for (const [n, p] of Object.entries(DP)) {
                const poly = polyFromPath(p);
                if (ptInPoly(sx, sy, poly)) return n;
            }
            let min = 1e9, b = null;
            for (const [n, c] of Object.entries(CN)) {
                const d = Math.hypot(c[0] - sx, c[1] - sy);
                if (d < min) { min = d; b = n; }
            }
            return b;
        }

        function sdrag(e, n, tp) {
            e.preventDefault(); if (tp === 'unit') su = n; else ss = n;
            document.addEventListener('touchmove', dm, {passive: false}); document.addEventListener('touchend', de);
            document.addEventListener('mousemove', dm); document.addEventListener('mouseup', de);
        }
        function dm(e) { const t = e.touches ? e.touches[0] : e; const el = document.getElementById(su ? `unit-${su}` : `squad-${ss}`); if (el) { el.setAttribute('x', (t.clientX - tx) / scale); el.setAttribute('y', (t.clientY - 50 - ty) / scale); } }
        function de(e) {
            document.removeEventListener('touchmove', dm); document.removeEventListener('touchend', de);
            document.removeEventListener('mousemove', dm); document.removeEventListener('mouseup', de);
            const t = e.changedTouches ? e.changedTouches[0] : e; const tg = gd(t.clientX, t.clientY - 50);
            if (tg && gs) {
                if (su) api('/api/move_unit', {unit_type:su, district:tg}).then(d => { if (!d.error) { gs.special_units = d.special_units; ub(); rm(); } });
                else api('/api/squad_action', {command:'move', params:{name:ss, district:tg}}).then(d => { if (!d.error) { gs.budget = d.budget; gs.squads = d.squads; ub(); rm(); } });
            }
            su = null; ss = null;
        }

        function dc(name) {
            sd = name;
            const s = gs; let h = `<b>📍 ${name}</b><br>🏗️ ${DN[name]}<br>🔥 Бунты: ${s.riots[name]||0}%<br>🚔 Отряды: ${(s.squads||[]).filter(q => q.location === name).map(q => q.name).join(', ')||'нет'}<br>`;
            if (s.police_stations?.[name]?.active) h += '🏢 Участок ✅<br>'; if (s.checkpoints?.[name]?.active) h += '🚧 Блокпост ✅<br>';
            h += `<hr><button class="btn green small" onclick="hs('${name}')">🚔 Нанять отряд (2M)</button><button class="btn small" onclick="closeM()">Закрыть</button>`;
            document.getElementById('m-content').innerHTML = h; document.getElementById('modal').classList.remove('hidden');
        }

        async function hs(d) { const r = await api('/api/squad_action', {command:'form', params:{type:'патруль', district:d}}); if (r.error) alert(r.error); else { gs.budget = r.budget; gs.squads = r.squads; ub(); closeM(); rm(); } }
        async function alertLevel(l) { const d = await api('/api/set_alert_level', {level:l}); if (d.error) alert(d.error); else { gs.alert_level = d.alert_level; gs.budget = d.budget; ub(); } }
        async function gov(s) { const d = await api('/api/gov_request', {structure:s}); if (d.error) alert(d.error); else { gs.budget = d.budget; gs.trust = d.trust; gs.threat = d.threat; ub(); alert(d.result); } }
        function closeM() { document.getElementById('modal').classList.add('hidden'); }

        function rb() { document.getElementById('t-build').innerHTML = '<h3>🏗️ Строительство</h3><div class="card"><b>🏢 Участок</b><br>5M ₽<br><button class="btn green small" onclick="bs()">Построить</button></div><div class="card"><b>🚧 Блокпост</b><br>1M ₽<br><button class="btn small" style="border-color:#FF9800;color:#FF9800;" onclick="bc()">Построить</button></div>'; }
        async function bs() { if (!sd) { alert('Выберите район на карте!'); return; } const d = await api('/api/buy_station', {district:sd}); if (d.error) alert(d.error); else { gs.budget = d.budget; gs.police_stations = d.police_stations; ub(); rm(); } }
        async function bc() { if (!sd) { alert('Выберите район на карте!'); return; } const d = await api('/api/extra_action', {action_type:'checkpoint', district:sd}); if (d.error) alert(d.error); else { gs.budget = d.budget; gs.riots = d.riots; if (!gs.checkpoints) gs.checkpoints = {}; gs.checkpoints[sd] = {active:true}; ub(); rm(); } }

        function rmain() {
            const s = gs; let h = '';
            if (s.game_over) h = `<div class="card">Игра завершена. День ${s.day}</div><button class="btn green" onclick="start()">Новая игра</button>`;
            else if (!s.day_started) h = `<div class="card"><b>День ${s.day}</b><br>Нажмите кнопку ниже.</div><button class="btn green" onclick="dsd()">📅 Начать день</button>`;
            else { h = `<div class="card">${s.last_summary||''}</div>`; (s.pending_actions||[]).forEach(a => h += `<button class="btn small" onclick="da('${a}')">${a}</button>`); h += '<hr><button class="btn red" onclick="ded()">🌙 Завершить день</button>'; }
            document.getElementById('t-main').innerHTML = h;
        }

        async function dsd() { const d = await api('/api/start_day'); if (d.error) alert(d.error); else { gs.day_started = true; gs.last_summary = d.summary; gs.pending_actions = d.actions; gs.budget = d.budget; ub(); st('main'); } }
        async function da(a) { const d = await api('/api/action', {action:a}); if (d.error) alert(d.error); else { gs.budget = d.budget; gs.threat = d.threat; gs.stability = d.stability; ub(); alert(d.result); rmain(); } }
        async function ded() { const d = await api('/api/end_day'); gs.day = d.day; gs.day_started = false; gs.budget = d.budget; gs.game_over = d.game_over; ub(); if (d.night_event) alert(d.night_event); if (d.game_over) alert(d.game_over_msg); st('main'); }

        function rsq() { let h = '<h3>🚔 Отряды</h3>'; (gs.squads||[]).forEach(s => h += `<div class="card">${s.name} (${s.type}) 📍${s.location} 💪${s.strength} <button class="btn red small" onclick="dsq('${s.name}')">❌</button></div>`); h += '<button class="btn green small" onclick="asq()">+ Новый отряд (2M)</button>'; document.getElementById('t-squads').innerHTML = h; }
        async function asq() { const d = await api('/api/squad_action', {command:'form', params:{type:'патруль'}}); if (d.error) alert(d.error); else { gs.budget = d.budget; gs.squads = d.squads; ub(); rsq(); } }
        async function dsq(name) { const d = await api('/api/squad_action', {command:'disband', params:{name}}); if (d.error) alert(d.error); else { gs.budget = d.budget; gs.squads = d.squads; ub(); rsq(); rm(); } }
    </script>
</body>
  </html>
