<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Глава полиции: Час расплаты</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0d0d1a; color: #d0d0d0; font-size: 14px; overflow: hidden; height: 100vh; }
        .hidden { display: none !important; }
        .screen { padding: 10px; height: 100vh; display: flex; flex-direction: column; }
        .btn {
            display: block; width: 100%; padding: 10px; margin: 4px 0;
            background: #141428; color: #d0d0d0; border: 1px solid #2a2a4a;
            border-radius: 8px; font-size: 13px; cursor: pointer; text-align: center;
        }
        .btn.green { border-color: #4CAF50; color: #4CAF50; }
        .btn.red { border-color: #e94560; color: #e94560; }
        .btn.orange { border-color: #FF9800; color: #FF9800; }
        .top-bar {
            display: flex; gap: 4px; flex-wrap: wrap; padding: 8px;
            background: #141428; border-radius: 8px; margin-bottom: 6px;
        }
        .stat { font-size: 11px; background: #1a1a35; padding: 4px 8px; border-radius: 4px; }
        .stat.red { color: #e94560; }
        .stat.green { color: #4CAF50; }
        .tabs { display: flex; gap: 3px; margin: 4px 0; }
        .tab {
            flex: 1; padding: 8px; text-align: center; background: #141428;
            border-radius: 6px; font-size: 10px; cursor: pointer; border: 1px solid #2a2a4a;
        }
        .tab.active { border-color: #e94560; }
        .map-container { flex: 1; position: relative; min-height: 0; }
        svg { width: 100%; height: 100%; }
        .district { stroke: #2a2a4a; stroke-width: 2; cursor: pointer; transition: fill 0.3s; }
        .district:hover { stroke: #fff; stroke-width: 3; }
        .squad-icon { cursor: grab; transition: transform 0.1s; font-size: 18px; }
        .squad-icon:active { cursor: grabbing; transform: scale(1.3); }
        .building-icon { font-size: 20px; }
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; justify-content: center;
            align-items: center; z-index: 1000;
        }
        .modal-content {
            background: #141428; padding: 16px; border-radius: 12px;
            max-width: 90%; border: 1px solid #2a2a4a;
        }
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; display: flex;
            background: #0d0d1a; border-top: 1px solid #2a2a4a; padding: 6px;
        }
        .nav-btn { flex: 1; padding: 8px; text-align: center; font-size: 10px; background: none; border: none; color: #888; cursor: pointer; }
        .nav-btn.active { color: #e94560; }
    </style>
</head>
<body>
    <div id="menu-screen" class="screen">
        <h2>🛡️ Глава полиции</h2>
        <p style="color:#e94560;">Час расплаты</p>
        <button class="btn green" onclick="startGame('captain')">🟢 Капитан — 15M ₽</button>
        <button class="btn orange" onclick="startGame('major')">🟡 Майор — 10M ₽</button>
        <button class="btn red" onclick="startGame('colonel')">🔴 Полковник — 6M ₽</button>
    </div>

    <div id="game-screen" class="screen hidden">
        <div class="top-bar" id="top-bar"></div>
        <div class="tabs">
            <div class="tab active" data-tab="map">🗺️ Карта</div>
            <div class="tab" data-tab="main">📋 Сводка</div>
            <div class="tab" data-tab="squads">🚔 Отряды</div>
            <div class="tab" data-tab="build">🏗️ Строить</div>
        </div>
        <div id="tab-map" class="map-container"></div>
        <div id="tab-main" class="hidden"></div>
        <div id="tab-squads" class="hidden"></div>
        <div id="tab-build" class="hidden"></div>
        <div class="bottom-nav">
            <button class="nav-btn active" data-tab="map">🗺️</button>
            <button class="nav-btn" data-tab="main">📋</button>
            <button class="nav-btn" data-tab="squads">🚔</button>
            <button class="nav-btn" data-tab="build">🏗️</button>
        </div>
    </div>

    <div id="modal" class="modal hidden">
        <div class="modal-content" id="modal-content"></div>
    </div>

    <script>
        const TG = window.Telegram.WebApp; TG.ready(); TG.expand();
        const USER_ID = TG.initDataUnsafe?.user?.id || 1;
        let gameState = null;
        let selectedDistrict = null;
        let draggedSquad = null;

        async function api(url, body = {}) {
            const res = await fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user_id: USER_ID, ...body}) });
            return await res.json();
        }

        function switchTab(t) {
            document.querySelectorAll('.tab,.nav-btn').forEach(e => e.classList.remove('active'));
            document.querySelectorAll(`[data-tab="${t}"]`).forEach(e => e.classList.add('active'));
            ['map','main','squads','build'].forEach(x => document.getElementById(`tab-${x}`).classList.add('hidden'));
            document.getElementById(`tab-${t}`).classList.remove('hidden');
            if (t === 'map') renderMap();
            if (t === 'main') renderMain();
            if (t === 'squads') renderSquads();
            if (t === 'build') renderBuild();
        }

        document.querySelectorAll('.tab,.nav-btn').forEach(e => e.addEventListener('click', () => switchTab(e.dataset.tab)));

        async function startGame(diff) {
            const d = await api('/api/new_game', {difficulty: diff});
            if (d.status === 'ok') {
                gameState = d.state;
                document.getElementById('menu-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
                updateTopBar();
                switchTab('map');
            }
        }

        function updateTopBar() {
            const s = gameState;
            document.getElementById('top-bar').innerHTML = `
                <span class="stat">📅 День ${s.day}</span>
                <span class="stat">💰 ${(s.budget||0).toLocaleString()} ₽</span>
                <span class="stat ${s.threat>70?'red':'green'}">⚠️ ${s.threat}%</span>
                <span class="stat ${s.stability<30?'red':'green'}">🏙️ ${s.stability}%</span>
            `;
        }

        const DISTRICTS = ["Центр", "Северный", "Спальный", "Зелёный", "Промзона", "Старый город", "Заречный", "Вокзальный"];

        const districtPaths = {
            "Центр": "M 250 150 L 400 150 L 420 220 L 380 300 L 250 300 L 220 220 Z",
            "Северный": "M 200 60 L 400 60 L 400 150 L 250 150 L 220 100 Z",
            "Спальный": "M 100 150 L 250 150 L 220 220 L 100 280 Z",
            "Зелёный": "M 60 250 L 100 150 L 100 280 Z",
            "Промзона": "M 380 300 L 500 250 L 550 350 L 450 400 Z",
            "Старый город": "M 250 300 L 380 300 L 350 450 L 250 450 Z",
            "Заречный": "M 100 280 L 220 220 L 250 450 L 100 420 Z",
            "Вокзальный": "M 450 400 L 550 350 L 600 500 L 450 500 Z"
        };

        function getRiotColor(riot) {
            if (riot > 70) return '#e94560';
            if (riot > 40) return '#FF9800';
            return '#4CAF50';
        }

        function renderMap() {
            if (!gameState) return;
            const container = document.getElementById('tab-map');
            const s = gameState;
            let html = `<svg viewBox="0 0 650 550" xmlns="http://www.w3.org/2000/svg">`;

            for (const [name, path] of Object.entries(districtPaths)) {
                const riot = s.riots[name] || 0;
                const color = getRiotColor(riot);
                html += `<path id="district-${name}" class="district" d="${path}" fill="${color}" fill-opacity="0.4" onclick="onDistrictClick('${name}')" />`;
            }

            if (s.police_stations) {
                for (const [district, station] of Object.entries(s.police_stations)) {
                    if (station.active) {
                        const center = getDistrictCenter(district);
                        html += `<text class="building-icon" x="${center.x}" y="${center.y-10}" font-size="20" text-anchor="middle" fill="white">🏢</text>`;
                    }
                }
            }

            if (s.checkpoints) {
                for (const [district, cp] of Object.entries(s.checkpoints)) {
                    if (cp.active) {
                        const center = getDistrictCenter(district);
                        html += `<text class="building-icon" x="${center.x}" y="${center.y+20}" font-size="18" text-anchor="middle" fill="orange">🚧</text>`;
                    }
                }
            }

            if (s.squads) {
                s.squads.forEach(squad => {
                    const center = getDistrictCenter(squad.location);
                    if (center) {
                        html += `<text id="squad-${squad.name}" class="squad-icon" x="${center.x}" y="${center.y+5}" font-size="18" text-anchor="middle" fill="white" stroke="black" stroke-width="1"
                            ontouchstart="startDrag(event, '${squad.name}')"
                            onmousedown="startDrag(event, '${squad.name}')">🚔</text>`;
                    }
                });
            }

            html += '</svg>';
            html += `<div style="position:absolute; bottom:10px; left:10px; background:#141428; padding:6px; border-radius:6px; font-size:10px;">
                🟢 Стабильно &nbsp; 🟡 Напряжённо &nbsp; 🔴 Бунт
            </div>`;

            container.innerHTML = html;
        }

        function getDistrictCenter(name) {
            const centers = {
                "Центр": {x: 320, y: 220},
                "Северный": {x: 300, y: 100},
                "Спальный": {x: 160, y: 200},
                "Зелёный": {x: 80, y: 220},
                "Промзона": {x: 470, y: 320},
                "Старый город": {x: 310, y: 370},
                "Заречный": {x: 160, y: 350},
                "Вокзальный": {x: 520, y: 440}
            };
            return centers[name];
        }

        function getDistrictFromPoint(x, y) {
            let minDist = Infinity, closest = null;
            for (const [name, center] of Object.entries({
                "Центр": {x:320,y:220}, "Северный": {x:300,y:100}, "Спальный": {x:160,y:200},
                "Зелёный": {x:80,y:220}, "Промзона": {x:470,y:320}, "Старый город": {x:310,y:370},
                "Заречный": {x:160,y:350}, "Вокзальный": {x:520,y:440}
            })) {
                const dist = Math.hypot(center.x - x, center.y - y);
                if (dist < minDist) { minDist = dist; closest = name; }
            }
            return closest;
        }

        function startDrag(event, squadName) {
            event.preventDefault();
            draggedSquad = squadName;
            document.addEventListener('touchmove', onDragMove, {passive: false});
            document.addEventListener('touchend', onDragEnd);
            document.addEventListener('mousemove', onDragMove);
            document.addEventListener('mouseup', onDragEnd);
        }

        function onDragMove(event) {
            if (!draggedSquad) return;
            const touch = event.touches ? event.touches[0] : event;
            const el = document.getElementById(`squad-${draggedSquad}`);
            if (el) {
                el.setAttribute('x', touch.clientX);
                el.setAttribute('y', touch.clientY - 50);
            }
        }

        function onDragEnd(event) {
            if (!draggedSquad) return;
            const touch = event.changedTouches ? event.changedTouches[0] : event;
            const dropX = touch.clientX;
            const dropY = touch.clientY - 50;
            const targetDistrict = getDistrictFromPoint(dropX, dropY);
            if (targetDistrict && gameState) {
                api('/api/squad_action', { command: 'move', params: {name: draggedSquad, district: targetDistrict} }).then(data => {
                    if (!data.error) {
                        gameState.budget = data.budget;
                        gameState.squads = data.squads;
                        updateTopBar();
                        renderMap();
                    }
                });
            } else {
                renderMap();
            }
            document.removeEventListener('touchmove', onDragMove);
            document.removeEventListener('touchend', onDragEnd);
            document.removeEventListener('mousemove', onDragMove);
            document.removeEventListener('mouseup', onDragEnd);
            draggedSquad = null;
        }

        function onDistrictClick(name) {
            selectedDistrict = name;
            const s = gameState;
            const riot = s.riots[name] || 0;
            const squadsHere = (s.squads||[]).filter(sq => sq.location === name).map(sq => sq.name).join(', ') || 'нет';
            let html = `<b>📍 ${name}</b><br>🔥 Бунты: ${riot}%<br>🚔 Отряды: ${squadsHere}<br>`;
            if (s.police_stations && s.police_stations[name] && s.police_stations[name].active) html += `🏢 Участок: ✅<br>`;
            if (s.checkpoints && s.checkpoints[name] && s.checkpoints[name].active) html += `🚧 Блокпост: ✅<br>`;
            html += `<hr>
                <button class="btn green" onclick="extraAction('patrol', '${name}')">👮 Патруль (300k)</button>
                <button class="btn red" onclick="extraAction('suppress', '${name}')">🚨 Подавить бунт</button>
                <button class="btn orange" onclick="extraAction('hq', '${name}')">🏴 Временный штаб (3M)</button>
                <button class="btn" onclick="closeModal()">Закрыть</button>`;
            document.getElementById('modal-content').innerHTML = html;
            document.getElementById('modal').classList.remove('hidden');
        }

        async function extraAction(type, district) {
            const data = await api('/api/extra_action', {action_type: type, district: district});
            if (data.error) { alert(data.error); return; }
            gameState.budget = data.budget;
            gameState.riots = data.riots;
            gameState.threat = data.threat;
            updateTopBar();
            closeModal();
            renderMap();
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function renderBuild() {
            let h = '<h3>🏗️ Строительство</h3>';
            h += `<div class="card"><b>🏢 Полицейский участок</b><br>Стоимость: 5 000 000 ₽<br>+200 000 ₽/день, снижает бунты в районе на 5% каждый день.<br>
                <button class="btn green" onclick="buildStation()">Построить</button></div>`;
            h += `<div class="card"><b>🚧 Блокпост</b><br>Стоимость: 1 000 000 ₽<br>Мгновенно снижает бунты на 10-20%, одноразово.<br>
                <button class="btn orange" onclick="buildCheckpoint()">Построить</button></div>`;
            document.getElementById('tab-build').innerHTML = h;
        }

        async function buildStation() {
            if (!selectedDistrict) { alert('Сначала выберите район на карте!'); return; }
            const data = await api('/api/buy_station', {district: selectedDistrict});
            if (data.error) { alert(data.error); return; }
            gameState.budget = data.budget;
            gameState.police_stations = data.police_stations;
            updateTopBar();
            renderMap();
        }

        async function buildCheckpoint() {
            if (!selectedDistrict) { alert('Сначала выберите район на карте!'); return; }
            const data = await api('/api/extra_action', {action_type: 'checkpoint', district: selectedDistrict});
            if (data.error) { alert(data.error); return; }
            gameState.budget = data.budget;
            gameState.riots = data.riots;
            if (!gameState.checkpoints) gameState.checkpoints = {};
            gameState.checkpoints[selectedDistrict] = {active: true};
            updateTopBar();
            renderMap();
        }

        function renderMain() {
            if (!gameState) return;
            const s = gameState;
            let h = '';
            if (s.game_over) {
                h += `<div class="card">Игра завершена. День ${s.day}</div><button class="btn green" onclick="startGame('${s.difficulty||'major'}')">Новая игра</button>`;
            } else if (!s.day_started) {
                h += `<div class="card">День ${s.day}</div><button class="btn green" onclick="doStartDay()">📅 Начать день</button>`;
            } else {
                h += `<div class="card">${s.last_summary||''}</div>`;
                (s.pending_actions||[]).forEach(a => h += `<button class="btn" onclick="doAction('${a}')">${a}</button>`);
                h += `<button class="btn red" onclick="doEndDay()">🌙 Завершить день</button>`;
            }
            document.getElementById('tab-main').innerHTML = h;
        }

        async function doStartDay() {
            const d = await api('/api/start_day');
            if (d.error) { alert(d.error); return; }
            gameState.day_started = true; gameState.last_summary = d.summary; gameState.pending_actions = d.actions; gameState.budget = d.budget;
            updateTopBar();
            switchTab('main');
        }

        async function doAction(a) {
            const d = await api('/api/action', {action: a});
            if (d.error) { alert(d.error); return; }
            gameState.budget = d.budget; gameState.threat = d.threat; gameState.stability = d.stability;
            updateTopBar();
            alert(d.result);
            renderMain();
        }

        async function doEndDay() {
            const d = await api('/api/end_day');
            gameState.day = d.day; gameState.day_started = false; gameState.budget = d.budget; gameState.game_over = d.game_over;
            updateTopBar();
            if (d.night_event) alert(d.night_event);
            if (d.game_over) alert(d.game_over_msg);
            switchTab('main');
        }

        function renderSquads() {
            if (!gameState) return;
            let h = '<h3>🚔 Отряды</h3>';
            (gameState.squads||[]).forEach(s => h += `<div class="card">${s.name} (${s.type}) 📍${s.location} 💪${s.strength} <button class="btn small red" onclick="disbandSquad('${s.name}')">❌</button></div>`);
            h += '<button class="btn green" onclick="addSquad()">+ Новый отряд (2M)</button>';
            document.getElementById('tab-squads').innerHTML = h;
        }

        async function addSquad() {
            const d = await api('/api/squad_action', {command: 'form', params: {type: 'патруль'}});
            if (d.error) alert(d.error); else { gameState.budget = d.budget; gameState.squads = d.squads; updateTopBar(); renderSquads(); }
        }

        async function disbandSquad(name) {
            const d = await api('/api/squad_action', {command: 'disband', params: {name: name}});
            if (d.error) alert(d.error);
            else {
                gameState.budget = d.budget;
                gameState.squads = d.squads;
                updateTopBar();
                renderSquads();
                renderMap();
            }
        }
    </script>
</body>
  </html>
